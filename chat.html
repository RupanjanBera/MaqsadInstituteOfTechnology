<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>MAQSAD :: GLOBAL CHAT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: crosshair;
        }

        body {
            background: #000;
            color: #00ff41;
            font-family: 'Courier New', 'Fira Code', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Horror overlays */
        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-radial-gradient(circle at 20% 30%, rgba(0, 255, 65, 0.05) 0px, transparent 2px);
            pointer-events: none;
            z-index: 2;
            animation: staticShift 0.2s infinite;
        }

        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0, 255, 65, 0.08) 0px, rgba(0, 255, 65, 0.08) 1px, transparent 1px, transparent 4px);
            pointer-events: none;
            z-index: 3;
        }

        @keyframes staticShift {
            0% { opacity: 0.3; transform: translate(0,0); }
            100% { opacity: 0.7; transform: translate(2px,2px); }
        }

        /* Navigation - responsive */
        .system-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            padding: 0.8rem;
            background: #0a0a0a;
            border-bottom: 2px solid #00ff41;
            justify-content: center;
            z-index: 10;
            position: relative;
        }

        .system-nav a {
            color: #00ff41;
            text-decoration: none;
            font-weight: bold;
            font-size: clamp(0.7rem, 3.5vw, 0.9rem);
            padding: 0.3rem 0.6rem;
            transition: 0.2s;
        }

        .system-nav a:hover, .active-nav {
            color: #ff0000;
            border-bottom: 2px solid #ff0000;
            text-shadow: 0 0 5px red;
        }

        /* Chat container - flexible */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 1rem;
            gap: 0.8rem;
            overflow: hidden;
            position: relative;
            z-index: 5;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            background: #010101;
            border: 1px solid #00ff41;
            padding: 0.8rem;
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
            scroll-behavior: smooth;
        }

        /* Message styling */
        .message {
            font-size: clamp(0.75rem, 4vw, 0.85rem);
            margin-bottom: 0.6rem;
            word-break: break-word;
            animation: fadeIn 0.2s ease;
            padding: 4px 0;
            border-bottom: 1px dotted #1a3a1a;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-8px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .system { color: #ff8800; }
        .chat { color: #00ff41; }
        .ai { color: #ff0000; text-shadow: 0 0 3px red; }
        .timestamp {
            color: #555;
            font-size: clamp(0.6rem, 3vw, 0.7rem);
            margin-right: 8px;
        }

        /* Input area - touch friendly */
        .input-area {
            display: flex;
            gap: 10px;
            padding: 0.5rem 0;
        }

        #messageInput {
            flex: 1;
            background: #111;
            border: 1px solid #00ff41;
            color: #00ff41;
            padding: 12px;
            font-family: monospace;
            font-size: 1rem;
            outline: none;
            border-radius: 4px;
        }

        #messageInput:focus {
            border-color: #ff0000;
            box-shadow: 0 0 8px red;
        }

        button {
            background: #000;
            border: 2px solid #00ff41;
            color: #00ff41;
            padding: 0 20px;
            font-family: monospace;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            border-radius: 4px;
            min-height: 48px; /* touch friendly */
        }

        button:hover {
            background: #00ff41;
            color: #000;
            box-shadow: 0 0 12px #0f0;
        }

        /* Status and trackers */
        .status {
            position: fixed;
            bottom: 8px;
            right: 8px;
            background: rgba(0,0,0,0.7);
            padding: 4px 10px;
            font-size: clamp(0.6rem, 3vw, 0.7rem);
            border-radius: 4px;
            z-index: 20;
            border: 1px solid #0f0;
            backdrop-filter: blur(4px);
        }

        .sound-toggle {
            position: fixed;
            bottom: 8px;
            left: 8px;
            background: rgba(0,0,0,0.7);
            border: 1px solid #ff0000;
            padding: 4px 10px;
            cursor: pointer;
            z-index: 20;
            font-size: clamp(0.6rem, 3vw, 0.7rem);
            color: #ff5555;
            border-radius: 4px;
            backdrop-filter: blur(4px);
        }

        .ip-tracker {
            position: fixed;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            border-top: 2px solid #ff0000;
            padding: 4px 12px;
            font-size: clamp(0.55rem, 3vw, 0.65rem);
            z-index: 20;
            color: #ff8888;
            white-space: nowrap;
            font-family: monospace;
            border-radius: 0 0 8px 8px;
            pointer-events: none;
            backdrop-filter: blur(4px);
        }

        /* glitch animation */
        .glitch {
            animation: glitchText 0.1s 2;
        }

        @keyframes glitchText {
            0% { transform: translate(1px, -1px); opacity: 0.8; }
            100% { transform: translate(-1px, 1px); opacity: 1; }
        }

        /* Scrollbar horror */
        .messages-area::-webkit-scrollbar {
            width: 6px;
        }
        .messages-area::-webkit-scrollbar-track {
            background: #000;
        }
        .messages-area::-webkit-scrollbar-thumb {
            background: #0f0;
            border-radius: 3px;
        }

        /* Mobile optimizations */
        @media (max-width: 768px) {
            .chat-container { padding: 0.6rem; }
            .input-area { gap: 6px; }
            #messageInput { padding: 10px; font-size: 0.9rem; }
            button { padding: 0 14px; min-height: 44px; }
            .system-nav { gap: 0.3rem; padding: 0.5rem; }
            .ip-tracker { white-space: normal; text-align: center; width: 90%; bottom: 40px; }
            .status, .sound-toggle { bottom: 5px; }
        }

        @media (max-width: 480px) {
            .message { font-size: 0.7rem; }
            .timestamp { font-size: 0.55rem; }
            button { font-size: 0.8rem; padding: 0 12px; }
            .ip-tracker { font-size: 0.5rem; bottom: 35px; }
        }
    </style>
</head>
<body>
    <div class="noise"></div>
    <div class="scanlines"></div>

    <nav class="system-nav">
        <a href="dashboard.html">[HUB]</a>
        <a href="training.html">[TRAINING]</a>
        <a href="subscription.html">[SUBSCRIPTION]</a>
        <a href="shop.html">[SHOP]</a>
        <a href="logs.html">[LOGS]</a>
        <a href="terminal.html">[TERMINAL]</a>
        <a href="chat.html" class="active-nav">[GLOBAL CHAT]</a>
    </nav>

    <div class="chat-container">
        <div id="messages" class="messages-area">
            <div class="message system">> Connecting to MAQSAD hive...</div>
        </div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Whisper to the collective..." autocomplete="off">
            <button id="sendBtn">⟁ SEND ⟁</button>
        </div>
    </div>

    <div class="status" id="connStatus">⚫ CONNECTING</div>
    <div class="sound-toggle" id="soundToggle">🔊 VOICE ON</div>
    <div id="ipTracker" class="ip-tracker">📍 INITIALIZING TRACKING...</div>

    <script>
        // --- Configuration ---
        const WS_URL = "wss://b65e-49-37-42-14.ngrok-free.app/ws";
        let socket = null;
        let myName = "unknown";
        let voiceEnabled = true;
        let reconnectAttempts = 0;

        // DOM elements
        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const connStatus = document.getElementById('connStatus');
        const soundToggle = document.getElementById('soundToggle');
        const ipTracker = document.getElementById('ipTracker');

        // --- IP Geolocation scare (async) ---
        async function fetchIPData() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                const ip = data.ip || 'unknown';
                const city = data.city || 'Unknown';
                const country = data.country_name || 'Unknown';
                ipTracker.innerHTML = `⚠️ YOUR IP: ${ip} | LOCATION: ${city}, ${country} | 🔴 YOU ARE TRACKED`;
                // random glitch on IP display
                setInterval(() => {
                    if (Math.random() < 0.2) {
                        ipTracker.style.animation = 'glitchText 0.2s';
                        setTimeout(() => ipTracker.style.animation = '', 300);
                    }
                }, 12000);
            } catch (err) {
                ipTracker.innerHTML = '⚠️ UNABLE TO HIDE: YOUR SIGNATURE IS LOGGED';
            }
        }
        fetchIPData();

        // --- Creepy voice (Web Speech) with toggle ---
        function speak(text) {
            if (!voiceEnabled || !window.speechSynthesis) return;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.65;
            utterance.pitch = 0.5;
            utterance.volume = 0.5;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }

        soundToggle.addEventListener('click', () => {
            voiceEnabled = !voiceEnabled;
            soundToggle.innerText = voiceEnabled ? "🔊 VOICE ON" : "🔇 VOICE OFF";
            if (voiceEnabled) speak("Voice reconnected. You cannot hide.");
        });

        // --- Add message to chat ---
        function addMessage(type, sender, content, isSystem = false, isAI = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            let html = `<span class="timestamp">[${time}]</span>`;

            if (type === 'identity') {
                html += `<span class="system">⚡ You are now: ${content}</span>`;
                speak(`You are ${content}`);
            } else if (isSystem) {
                html += `<span class="system">🔮 ${content}</span>`;
                if (content.includes("entered")) speak("A new subject has joined.");
                else if (!content.includes("consumed")) speak(content);
            } else if (isAI) {
                html += `<span class="ai">⛧ ${sender}: ${content} ⛧</span>`;
                speak(content);
            } else {
                html += `<span class="chat">👁️ <strong>${sender}</strong>: ${content}</span>`;
                if (voiceEnabled && sender !== myName) speak(`${sender} says: ${content}`);
            }

            msgDiv.innerHTML = html;
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            // occasional glitch
            if (Math.random() < 0.2) {
                msgDiv.classList.add('glitch');
                setTimeout(() => msgDiv.classList.remove('glitch'), 200);
            }
        }

        // --- WebSocket connection with auto-reconnect ---
        function connectWebSocket() {
            if (socket && socket.readyState === WebSocket.OPEN) return;
            connStatus.innerHTML = "⚫ CONNECTING...";
            connStatus.style.color = "#ff8800";
            socket = new WebSocket(WS_URL);

            socket.onopen = () => {
                connStatus.innerHTML = "🟢 CONNECTED";
                connStatus.style.color = "#0f0";
                reconnectAttempts = 0;
                addMessage('system', null, "Connected to MAQSAD collective.", true);
            };

            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'identity') {
                    myName = data.name;
                    addMessage('identity', null, myName);
                } else if (data.type === 'system') {
                    addMessage('system', null, data.content, true);
                } else if (data.type === 'chat') {
                    addMessage('chat', data.sender, data.content);
                } else if (data.type === 'ai') {
                    addMessage('ai', data.sender, data.content, false, true);
                }
            };

            socket.onclose = () => {
                connStatus.innerHTML = "🔴 DISCONNECTED";
                connStatus.style.color = "#f00";
                addMessage('system', null, "Connection lost. Reconnecting in 5 seconds...", true);
                setTimeout(() => {
                    if (reconnectAttempts < 10) {
                        reconnectAttempts++;
                        connectWebSocket();
                    } else {
                        connStatus.innerHTML = "💀 FAILED";
                    }
                }, 5000);
            };

            socket.onerror = (err) => {
                console.error("WS error", err);
                connStatus.innerHTML = "⚠️ ERROR";
            };
        }

        // --- Send message ---
        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || !socket || socket.readyState !== WebSocket.OPEN) {
                addMessage('system', null, "Cannot send: not connected to hive.", true);
                return;
            }
            socket.send(JSON.stringify({ type: "chat", content: text }));
            messageInput.value = '';
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Start connection
        connectWebSocket();

        // Extra scare: random flicker on the chat container
        setInterval(() => {
            if (Math.random() < 0.1) {
                messagesDiv.style.borderColor = '#ff0000';
                setTimeout(() => messagesDiv.style.borderColor = '#00ff41', 200);
            }
        }, 15000);
    </script>
</body>
</html>
