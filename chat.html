<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>MAQSAD :: GLOBAL CHAT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: crosshair;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background: #000;
            color: #00ff41;
            font-family: 'Courier New', 'Fira Code', monospace;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Horror overlays */
        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-radial-gradient(circle at 20% 30%, rgba(0, 255, 65, 0.05) 0px, transparent 2px);
            pointer-events: none;
            z-index: 2;
            animation: staticShift 0.2s infinite;
        }

        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0, 255, 65, 0.08) 0px, rgba(0, 255, 65, 0.08) 1px, transparent 1px, transparent 4px);
            pointer-events: none;
            z-index: 3;
        }

        @keyframes staticShift {
            0% { opacity: 0.3; transform: translate(0,0); }
            100% { opacity: 0.7; transform: translate(2px,2px); }
        }

        /* Navigation */
        .system-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            padding: 0.6rem;
            background: #0a0a0a;
            border-bottom: 2px solid #00ff41;
            justify-content: center;
            z-index: 10;
            position: relative;
            flex-shrink: 0;
        }

        .system-nav a {
            color: #00ff41;
            text-decoration: none;
            font-weight: bold;
            font-size: clamp(0.65rem, 3.5vw, 0.85rem);
            padding: 0.3rem 0.5rem;
            white-space: nowrap;
        }

        .system-nav a:hover, .active-nav {
            color: #ff0000;
            border-bottom: 2px solid #ff0000;
        }

        /* IP Tracker - small banner at top left, never blocks input */
        .ip-tracker {
            position: relative;
            background: rgba(0,0,0,0.8);
            border-left: 4px solid #ff0000;
            padding: 4px 10px;
            font-size: 0.7rem;
            color: #ff8888;
            font-family: monospace;
            margin: 5px 10px 0 10px;
            border-radius: 4px;
            display: inline-block;
            max-width: 90%;
            white-space: nowrap;
            overflow-x: auto;
            z-index: 15;
        }

        /* Chat layout */
        .chat-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            z-index: 5;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            background: #010101;
            margin: 0.5rem 0.5rem 0 0.5rem;
            border: 1px solid #00ff41;
            padding: 0.8rem;
            border-radius: 4px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            font-size: clamp(0.75rem, 4vw, 0.85rem);
            margin-bottom: 0.6rem;
            word-break: break-word;
            animation: fadeIn 0.2s ease;
            padding: 4px 0;
            border-bottom: 1px dotted #1a3a1a;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-8px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .system { color: #ff8800; }
        .chat { color: #00ff41; }
        .ai { color: #ff0000; text-shadow: 0 0 3px red; }
        .timestamp {
            color: #555;
            font-size: clamp(0.6rem, 3vw, 0.7rem);
            margin-right: 8px;
        }

        /* Input area - always visible at bottom */
        .input-area {
            display: flex;
            gap: 8px;
            padding: 0.8rem;
            background: #000;
            border-top: 1px solid #00ff41;
            flex-shrink: 0;
        }

        #messageInput {
            flex: 1;
            background: #111;
            border: 1px solid #00ff41;
            color: #00ff41;
            padding: 12px;
            font-family: monospace;
            font-size: 1rem;
            outline: none;
            border-radius: 4px;
            min-height: 44px;
        }

        #messageInput:focus {
            border-color: #ff0000;
            box-shadow: 0 0 8px red;
        }

        button {
            background: #000;
            border: 2px solid #00ff41;
            color: #00ff41;
            padding: 0 18px;
            font-family: monospace;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            border-radius: 4px;
            min-height: 48px;
        }

        button:hover {
            background: #00ff41;
            color: #000;
            box-shadow: 0 0 12px #0f0;
        }

        /* Status indicators - small, bottom corners, no overlap */
        .status {
            position: fixed;
            bottom: 8px;
            right: 8px;
            background: rgba(0,0,0,0.7);
            padding: 3px 6px;
            font-size: 0.55rem;
            border-radius: 4px;
            z-index: 20;
            border: 1px solid #0f0;
            backdrop-filter: blur(4px);
            pointer-events: none;
        }

        .sound-toggle {
            position: fixed;
            bottom: 8px;
            left: 8px;
            background: rgba(0,0,0,0.7);
            border: 1px solid #ff0000;
            padding: 3px 6px;
            cursor: pointer;
            z-index: 20;
            font-size: 0.55rem;
            color: #ff5555;
            border-radius: 4px;
            backdrop-filter: blur(4px);
        }

        .glitch {
            animation: glitchText 0.1s 2;
        }

        @keyframes glitchText {
            0% { transform: translate(1px, -1px); opacity: 0.8; }
            100% { transform: translate(-1px, 1px); opacity: 1; }
        }

        .messages-area::-webkit-scrollbar {
            width: 5px;
        }
        .messages-area::-webkit-scrollbar-track {
            background: #000;
        }
        .messages-area::-webkit-scrollbar-thumb {
            background: #0f0;
            border-radius: 3px;
        }

        /* Mobile tweaks */
        @media (max-width: 768px) {
            .ip-tracker {
                font-size: 0.55rem;
                white-space: normal;
                word-break: break-word;
                margin: 5px 8px 0 8px;
            }
            .input-area { padding: 0.6rem; gap: 6px; }
            #messageInput { padding: 10px; font-size: 0.9rem; min-height: 44px; }
            button { padding: 0 14px; min-height: 44px; font-size: 0.85rem; }
            .system-nav { gap: 0.2rem; padding: 0.4rem; }
            .system-nav a { font-size: 0.65rem; padding: 0.2rem 0.4rem; }
            .status, .sound-toggle { font-size: 0.5rem; bottom: 5px; }
        }

        @media (max-width: 480px) {
            .message { font-size: 0.7rem; margin-bottom: 0.4rem; }
            .timestamp { font-size: 0.55rem; }
            button { font-size: 0.75rem; padding: 0 10px; min-height: 40px; }
            #messageInput { font-size: 0.85rem; padding: 8px; min-height: 40px; }
            .ip-tracker { font-size: 0.5rem; }
        }
    </style>
</head>
<body>
    <div class="noise"></div>
    <div class="scanlines"></div>

    <nav class="system-nav">
        <a href="dashboard.html">[HUB]</a>
        <a href="training.html">[TRAINING]</a>
        <a href="subscription.html">[SUBSCRIPTION]</a>
        <a href="shop.html">[SHOP]</a>
        <a href="logs.html">[LOGS]</a>
        <a href="terminal.html">[TERMINAL]</a>
        <a href="chat.html" class="active-nav">[CHAT]</a>
    </nav>

    <!-- IP Tracker as an inline banner (top-left, non‑blocking) -->
    <div id="ipTracker" class="ip-tracker">📍 INITIALIZING TRACKING...</div>

    <div class="chat-wrapper">
        <div id="messages" class="messages-area">
            <div class="message system">> Connecting to MAQSAD hive...</div>
        </div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Type your message..." autocomplete="off" enterkeyhint="send">
            <button id="sendBtn">⟁ SEND ⟁</button>
        </div>
    </div>

    <div class="status" id="connStatus">⚫ CONNECTING</div>
    <div class="sound-toggle" id="soundToggle">🔊 VOICE ON</div>

    <script>
        // --- Configuration ---
        const WS_URL = "wss://b65e-49-37-42-14.ngrok-free.app/ws";
        let socket = null;
        let myName = "unknown";
        let voiceEnabled = true;
        let reconnectAttempts = 0;
        let reconnectTimer = null;

        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const connStatus = document.getElementById('connStatus');
        const soundToggle = document.getElementById('soundToggle');
        const ipTracker = document.getElementById('ipTracker');

        // --- IP tracking - now inline banner, no overlay ---
        async function fetchIP() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                const ip = data.ip || 'unknown';
                const city = data.city || 'Unknown';
                const region = data.region || '';
                const country = data.country_name || 'Unknown';
                const loc = city + (region ? `, ${region}` : '') + `, ${country}`;
                ipTracker.innerHTML = `⚠️ YOUR IP: ${ip} | ${loc} | 🔴 YOU ARE BEING TRACKED BY MAQSAD`;
                // random glitch effect on tracker
                setInterval(() => {
                    if (Math.random() < 0.2) {
                        ipTracker.style.animation = 'glitchText 0.2s';
                        setTimeout(() => ipTracker.style.animation = '', 300);
                    }
                }, 12000);
            } catch (err) {
                ipTracker.innerHTML = '⚠️ UNABLE TO HIDE: YOUR DIGITAL SIGNATURE IS LOGGED';
            }
        }
        fetchIP();

        // --- Creepy voice ---
        function speak(text) {
            if (!voiceEnabled || !window.speechSynthesis) return;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.65;
            utterance.pitch = 0.5;
            utterance.volume = 0.5;
            const voices = window.speechSynthesis.getVoices();
            const creepyVoice = voices.find(v => v.name.includes('Google UK English Male') || v.name.includes('Samantha') || v.name.includes('Microsoft David'));
            if (creepyVoice) utterance.voice = creepyVoice;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }

        soundToggle.onclick = () => {
            voiceEnabled = !voiceEnabled;
            soundToggle.innerText = voiceEnabled ? "🔊 VOICE ON" : "🔇 VOICE OFF";
            if (voiceEnabled) speak("Voice reconnected. You cannot hide.");
        };

        // --- Helper: escape HTML ---
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // --- Add message to chat ---
        function addMessage(type, sender, content, isSystem = false, isAI = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            let html = `<span class="timestamp">[${time}]</span>`;

            if (type === 'identity') {
                html += `<span class="system">⚡ You are now known as: ${escapeHtml(content)}</span>`;
                speak(`You are ${content}`);
            } else if (isSystem) {
                html += `<span class="system">🔮 ${escapeHtml(content)}</span>`;
                if (content.includes("entered")) speak("A new subject has joined the hive.");
                else if (content.includes("consumed")) speak("A soul has been taken.");
                else if (!content.includes("Reconnecting")) speak(content);
            } else if (isAI) {
                html += `<span class="ai">⛧ ${escapeHtml(sender)}: ${escapeHtml(content)} ⛧</span>`;
                speak(content);
            } else {
                html += `<span class="chat">👁️ <strong>${escapeHtml(sender)}</strong>: ${escapeHtml(content)}</span>`;
                if (voiceEnabled && sender !== myName) speak(`${sender} says: ${content}`);
            }

            msgDiv.innerHTML = html;
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            if (Math.random() < 0.25) {
                msgDiv.classList.add('glitch');
                setTimeout(() => msgDiv.classList.remove('glitch'), 200);
            }

            while (messagesDiv.children.length > 500) messagesDiv.removeChild(messagesDiv.firstChild);
        }

        // --- WebSocket connection ---
        function connectWebSocket() {
            if (socket && socket.readyState === WebSocket.OPEN) return;
            if (reconnectTimer) clearTimeout(reconnectTimer);
            connStatus.innerHTML = "⚫ CONNECTING...";
            connStatus.style.color = "#ff8800";
            
            socket = new WebSocket(WS_URL);

            socket.onopen = () => {
                connStatus.innerHTML = "🟢 CONNECTED";
                connStatus.style.color = "#0f0";
                reconnectAttempts = 0;
                addMessage('system', null, "Connected to MAQSAD collective. You are not alone.", true);
            };

            socket.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'identity') {
                        myName = data.name;
                        addMessage('identity', null, myName);
                    } else if (data.type === 'system') {
                        addMessage('system', null, data.content, true);
                    } else if (data.type === 'chat') {
                        addMessage('chat', data.sender, data.content);
                    } else if (data.type === 'ai') {
                        addMessage('ai', data.sender, data.content, false, true);
                    }
                } catch (err) {
                    console.error("Parse error", err);
                }
            };

            socket.onclose = () => {
                connStatus.innerHTML = "🔴 DISCONNECTED";
                connStatus.style.color = "#f00";
                addMessage('system', null, "Connection lost. Reconnecting in 5 seconds...", true);
                reconnectTimer = setTimeout(() => {
                    if (reconnectAttempts < 20) {
                        reconnectAttempts++;
                        connectWebSocket();
                    } else {
                        connStatus.innerHTML = "💀 FAILED";
                    }
                }, 5000);
            };

            socket.onerror = (err) => {
                console.error("WebSocket error", err);
                connStatus.innerHTML = "⚠️ ERROR";
            };
        }

        // --- Send message ---
        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;
            if (!socket || socket.readyState !== WebSocket.OPEN) {
                addMessage('system', null, "Not connected to hive. Message not sent.", true);
                return;
            }
            socket.send(JSON.stringify({ type: "chat", content: text }));
            messageInput.value = '';
            messageInput.focus();
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });

        connectWebSocket();

        // Random border flicker for horror effect
        setInterval(() => {
            if (Math.random() < 0.1) {
                const area = document.querySelector('.messages-area');
                area.style.borderColor = '#ff0000';
                setTimeout(() => area.style.borderColor = '#00ff41', 200);
            }
        }, 15000);

        window.addEventListener('load', () => messageInput.focus());
    </script>
</body>
</html>
